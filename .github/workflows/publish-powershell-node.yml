name: Publish powershell-node

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.arm64
      - .github/workflows/publish-powershell-node.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASENAME: powershell-node
  IMAGE_TAG: pwsh7.4-node24
  NODE_VERSION: 24.0.0
  POWERSHELL_VERSION: 7.4.6

jobs:
  build:
    name: Build ${{ matrix.arch }} image
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/${IMAGE_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            POWERSHELL_VERSION=${{ env.POWERSHELL_VERSION }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}-${{ matrix.arch }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=PowerShell 7.4 on Ubuntu 22.04 with Node.js 24
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}

  publish:
    name: Publish multi-arch manifest
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/${IMAGE_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch tags
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.name }}:${IMAGE_TAG}" \
            "${{ steps.image.outputs.name }}:${IMAGE_TAG}-amd64" \
            "${{ steps.image.outputs.name }}:${IMAGE_TAG}-arm64"

          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.name }}:${GITHUB_SHA}" \
            "${{ steps.image.outputs.name }}:${GITHUB_SHA}-amd64" \
            "${{ steps.image.outputs.name }}:${GITHUB_SHA}-arm64"
